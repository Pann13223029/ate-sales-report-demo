name: Runtime Tick

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - name: Check runtime tick configuration
        id: config
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_BASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping runtime tick because APP_BASE_URL or CRON_SECRET is not configured."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Trigger current runtime tick
        if: steps.config.outputs.enabled == 'true'
        env:
          APP_BASE_URL: ${{ vars.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -sSf \
            -H "Authorization: Bearer $CRON_SECRET" \
            "${APP_BASE_URL%/}/api/cron"
