name: Legacy Weekly Stale Deal Check

on:
  workflow_dispatch:

jobs:
  stale-check:
    runs-on: ubuntu-latest
    steps:
      - name: Legacy workflow notice
        run: |
          echo "This workflow belongs to the older LINE/Python demo path."
          echo "It is kept for reference and manual use only."
      - name: Trigger stale deal check
        run: |
          curl -s -f -X GET \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            "https://ate-sales-demo.vercel.app/api/stale-check" \
            | jq .
